services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: medarchive
      POSTGRES_PASSWORD: medarchive
      POSTGRES_DB: medarchive
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medarchive"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    environment:
      MEDARCHIVE_DATABASE_URL: postgresql+asyncpg://medarchive:medarchive@db:5432/medarchive
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api
    command: npm run dev -- --host 0.0.0.0

volumes:
  pgdata:
  uploads:
